# ALSA routing for the orchestrator container.
#
# Maps the ALSA "default" PCM (what MIC_DEVICE/SPEAKER_DEVICE=unset resolves
# to) straight to the Astro MixAmp Pro (card 2 on this Pi):
#   - playback -> hw:2,0 (the MixAmp's stereo output — headphones)
#   - capture  -> hw:2,1 (the MixAmp's mic input)
#
# Without this, ALSA's raw hw devices reject arbitrary sample rates/formats
# (PortAudio "Invalid sample rate" / "Sample format not supported") and/or
# playback falls back to onboard HDMI instead of the MixAmp.
#
# NOTE: "card 2" is this Pi's current USB enumeration order for the MixAmp
# Pro — if it's unplugged/replugged or the Pi is rebooted with different USB
# devices attached, the card index can change. Check with `cat /proc/asound/cards`
# (from the Pi host or `docker compose exec orchestrator cat /proc/asound/cards`)
# and update the `card` values below if the MixAmp is no longer card 2.

pcm.!default {
    type asym
    playback.pcm {
        type hw
        card 2
        device 0
    }
    capture.pcm {
        type hw
        card 2
        device 1
    }
}

ctl.!default {
    type hw
    card 2
}
