# ALSA routing for the orchestrator container.
#
# Maps the ALSA "default" PCM (what MIC_DEVICE/SPEAKER_DEVICE=unset resolves
# to) to this Pi's actual mic/speaker, split across two different cards:
#   - playback -> hw:2,0 (Astro MixAmp Pro — headphones)
#   - capture  -> hw:3,0 (MC001 USB mic)
#
# Without this, ALSA's raw hw devices reject arbitrary sample rates/formats
# (PortAudio "Invalid sample rate" / "Sample format not supported") and/or
# playback falls back to onboard HDMI instead of the MixAmp.
#
# NOTE: these card numbers are this Pi's *current* USB enumeration order — if
# a device is unplugged/replugged (including moving it to a different USB
# port) or the Pi reboots with a different set of USB devices attached, the
# card index can change. Check with `cat /proc/asound/cards` (from the Pi host
# or `docker compose exec orchestrator cat /proc/asound/cards`) and update the
# `card` values below if they no longer match.

pcm.!default {
    type asym
    playback.pcm {
        type hw
        card 2
        device 0
    }
    capture.pcm {
        type hw
        card 3
        device 0
    }
}

ctl.!default {
    type hw
    card 2
}
