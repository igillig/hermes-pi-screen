name: Deploy parche-ui

# Builds and deploys the container on the Raspberry's self-hosted runner.
# Vite inlines the VITE_* values at build time, so the .env written below is
# read by `docker compose build` and baked into the static bundle.
#
# Required GitHub config (Settings -> Secrets and variables -> Actions),
# under the "production" environment:
#   Secrets:   VITE_HERMES_API_KEY
#   Variables: VITE_HERMES_API_URL   (and optionally HOST_PORT, default 8080)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-parche-ui
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          echo "VITE_HERMES_API_URL=${{ vars.VITE_HERMES_API_URL }}" > .env
          echo "VITE_HERMES_API_KEY=${{ secrets.VITE_HERMES_API_KEY }}" >> .env
          echo "HOST_PORT=${{ vars.HOST_PORT }}" >> .env

      - name: Build and deploy
        run: |
          docker compose -f stack.yml build
          docker compose -f stack.yml up -d --remove-orphans
          docker image prune -f
