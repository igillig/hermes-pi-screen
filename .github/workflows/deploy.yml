name: Deploy parche-ui

# Builds and deploys the container on the Raspberry's self-hosted runner.
# nginx reverse-proxies /api to Hermes, so the API key is a runtime env
# (HERMES_API_KEY) injected by the container, not baked into the bundle.
#
# Required GitHub config (Settings -> Secrets and variables -> Actions),
# under the "production" environment:
#   Secrets:   HERMES_API_KEY, OPENAI_API_KEY
#   Variables: HOST_PORT (optional, default 8080)
#              VITE_HERMES_API_URL (optional, default /api)
#              VITE_ORCHESTRATOR_WS_URL (optional, default ws://<hostname>:8765)
#              WAKE_WORD_ENABLED (optional, default false)
#
# Voice (mic/STT/Hermes/TTS/speakers) is handled by orchestrator/main.py, built
# and deployed as its own container in stack.yml (with /dev/snd passed through
# for real audio hardware access) — one push/up brings up both containers.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-parche-ui
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          echo "VITE_HERMES_API_URL=${{ vars.VITE_HERMES_API_URL }}" > .env
          echo "VITE_ORCHESTRATOR_WS_URL=${{ vars.VITE_ORCHESTRATOR_WS_URL }}" >> .env
          echo "HERMES_API_KEY=${{ secrets.HERMES_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.VITE_OPENAI_API_KEY }}" >> .env
          echo "WAKE_WORD_ENABLED=${{ vars.WAKE_WORD_ENABLED }}" >> .env
          echo "HOST_PORT=${{ vars.HOST_PORT }}" >> .env

      - name: Build and deploy
        run: |
          docker compose -f stack.yml build
          docker compose -f stack.yml up -d --remove-orphans
          docker image prune -f
