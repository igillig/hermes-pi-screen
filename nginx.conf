# Processed by the nginx image entrypoint (envsubst) at container start.
# Only HERMES_-prefixed vars are substituted (NGINX_ENVSUBST_FILTER=HERMES_),
# so nginx's own $variables are left untouched.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS, so the Hermes upstream is re-resolved at runtime
    # (survives Hermes container restarts / IP changes).
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # Reverse proxy to the audio service (Whisper STT + Piper TTS)
    location ~ ^/audio/(?<audiopath>.*)$ {
        set $audio "audio-service:8001";
        proxy_pass http://$audio/$audiopath$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 10m;
        proxy_read_timeout 60s;
    }

    # Reverse proxy to the Hermes API over the shared docker network
    # (hermes-agent_default). The browser calls same-origin /api/*, so no host/IP
    # is baked into the bundle, and the API key is injected here instead of
    # shipping to the client.
    location ~ ^/api/(?<path>.*)$ {
        set $hermes "hermes_agent:8000";
        proxy_pass http://$hermes/$path$is_args$args;

        proxy_http_version 1.1;
        proxy_set_header Host          $host;
        proxy_set_header Authorization "Bearer ${HERMES_API_KEY}";

        # Server-Sent Events / streaming: no buffering, keep the connection open.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache     off;
        proxy_read_timeout 1h;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
