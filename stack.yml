# ─────────────────────────────────────────────────────────────
# Portainer / docker-compose stack for parche-ui (HERMES frontend + voice)
#
# parche-ui: pure status display. Builds the image and serves it with nginx,
# which reverse-proxies /api/* to the Hermes container over the shared docker
# network (hermes-agent_default). The browser talks same-origin, so no IP or
# API key is baked into the bundle.
#
# orchestrator: owns the voice loop (orchestrator/main.py). Branch
# feature/openai-realtime: speaks directly to OpenAI's Realtime API
# (speech-to-speech) instead of the old VAD/Whisper/Hermes-HTTP/TTS pipeline,
# bridging tool-calls back to Hermes for real capability. Needs real audio
# hardware, so /dev/snd is passed through from the Pi host. Its status
# WebSocket is reached by the browser same-origin, via nginx proxying
# /ws-status to orchestrator:8765 over the internal docker network (see
# nginx.conf) — the "8765:8765" port below is only for direct debugging.
#
# `docker compose -f stack.yml up -d` brings both up together — one push
# deploys the whole thing.
#
# Works both as a Portainer stack and as `docker compose -f stack.yml ...`
# over SSH (see README).
# ─────────────────────────────────────────────────────────────

services:
  parche-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_HERMES_API_URL: ${VITE_HERMES_API_URL:-/api}
        VITE_ORCHESTRATOR_WS_URL: ${VITE_ORCHESTRATOR_WS_URL}
    image: parche-ui:latest
    container_name: parche-ui
    environment:
      # Injected into the Authorization header by nginx at runtime (envsubst),
      # so the key never ships in the browser bundle.
      HERMES_API_KEY: ${HERMES_API_KEY}
      NGINX_ENVSUBST_FILTER: HERMES_
    ports:
      - "${HOST_PORT:-8080}:80"
    restart: unless-stopped
    networks:
      - default
      - hermes

  orchestrator:
    build:
      context: orchestrator
      dockerfile: Dockerfile
    image: parche-orchestrator:latest
    container_name: parche-orchestrator
    devices:
      - /dev/snd:/dev/snd
    environment:
      # Auth for the Realtime API (speech-to-speech — replaces the old
      # separate Whisper STT + TTS calls entirely).
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REALTIME_MODEL: ${REALTIME_MODEL:-gpt-realtime}
      REALTIME_VOICE: ${REALTIME_VOICE:-marin}
      # Used only for the ask_hermes tool the realtime model calls when it
      # needs real capability (search, actions, etc), not for every turn.
      HERMES_API_URL: ${HERMES_API_URL:-http://hermes_agent:8000}
      HERMES_API_KEY: ${HERMES_API_KEY}
      STATUS_WS_HOST: 0.0.0.0
      STATUS_WS_PORT: 8765
      MIC_DEVICE: ${MIC_DEVICE:-}
      SPEAKER_DEVICE: ${SPEAKER_DEVICE:-}
      # Wake word stays off until a custom model is trained and dropped into
      # ./orchestrator/models (see orchestrator/.env.example).
      WAKE_WORD_ENABLED: ${WAKE_WORD_ENABLED:-false}
      OWW_MODEL_PATH: ${OWW_MODEL_PATH:-/app/models/che_parche.onnx}
      OWW_THRESHOLD: ${OWW_THRESHOLD:-0.5}
    volumes:
      - ./orchestrator/models:/app/models
    ports:
      - "8765:8765"
    restart: unless-stopped
    networks:
      - default
      - hermes

networks:
  # The network Hermes already runs on (created by its own compose project).
  hermes:
    name: hermes-agent_default
    external: true
