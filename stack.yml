# ─────────────────────────────────────────────────────────────
# Portainer / docker-compose stack for parche-ui (HERMES frontend)
#
# This is now a pure status display: it builds the image and serves it with
# nginx, which reverse-proxies /api/* to the Hermes container over the shared
# docker network (hermes-agent_default). The browser talks same-origin, so no
# IP or API key is baked into the bundle.
#
# Voice (mic/STT/Hermes/TTS/speakers) lives entirely in orchestrator/main.py,
# which runs directly on the Pi host (not in this stack) for hardware access,
# and pushes status to the UI over its own WebSocket (VITE_ORCHESTRATOR_WS_URL).
#
# Works both as a Portainer stack and as `docker compose -f stack.yml ...`
# over SSH (see README).
# ─────────────────────────────────────────────────────────────

services:
  parche-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_HERMES_API_URL: ${VITE_HERMES_API_URL:-/api}
        VITE_ORCHESTRATOR_WS_URL: ${VITE_ORCHESTRATOR_WS_URL}
    image: parche-ui:latest
    container_name: parche-ui
    environment:
      # Injected into the Authorization header by nginx at runtime (envsubst),
      # so the key never ships in the browser bundle.
      HERMES_API_KEY: ${HERMES_API_KEY}
      NGINX_ENVSUBST_FILTER: HERMES_
    ports:
      - "${HOST_PORT:-8080}:80"
    restart: unless-stopped
    networks:
      - default
      - hermes

networks:
  # The network Hermes already runs on (created by its own compose project).
  hermes:
    name: hermes-agent_default
    external: true
